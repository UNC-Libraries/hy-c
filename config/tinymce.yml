default: &default
  setup: tinymce_nav_safety # onChange event init
content_block:
  <<: *default
  menubar: false
  toolbar1: styleselect | bold italic | undo redo
  toolbar2: table | fullscreen | image
  plugins:
    - table
    - fullscreen
    - image
    - wordcount
rich_text:
  menubar: false
  toolbar:
    - "undo redo | bold italic underline | alignleft aligncenter alignright | link | numlist bullist outdent indent | blockquote | code"
  plugins:
    - "link lists code paste"
  invalid_styles: "color font-family"
  style_formats:
    - title: "Inline"
      items:
        - title: "Bold"
          inline: "b"
        - title: "Italic"
          inline: "i"
        - title: "Underline"
          inline: "u"
        - title: "Strikethrough"
          inline: "strike"
    - title: "Blocks"
      items:
        - title: "Paragraph"
          block: "p"
        - title: "Blockquote"
          block: "blockquote"
    - title: "Alignments"
      items:
        - title: "Left"
          block: ""
          classes: "align-left"
        - title: "Center"
          block: ""
          classes: "align-center"
        - title: "Right"
          block: ""
          classes: "align-right"
  setup: |
    function (editor) {
      editor.on('change', function () {
        tinymce.triggerSave();
        if (window.saveWorkControlInstance) {
          window.saveWorkControlInstance.validateMetadata();
        }
      });

      const maxLength = 10000; // Define your character limit here
      editor.on('input keyup paste', function() {
        let currentLength = editor.plugins.wordcount.body.getCharacterCount();
        if (currentLength >= maxLength) {
          // Prevent further typing if limit is reached
          let trimmedContent = editor.getContent({format: 'text'}).substring(0, maxLength);
          editor.setContent(trimmedContent);
        }
      });
    }

custom:
  <<: *default
